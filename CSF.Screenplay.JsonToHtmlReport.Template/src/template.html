<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenplay report</title>
</head>
<body>
    <div id="loadingMask">
        <div id="spinnerContainer"><div id="loadingSpinner"></div></div>
    </div>
    <div id="liteboxMask">
        <div id="litebox">
            <fieldset class="controls">
                <button class="download" title="Download"><span>Download</span></button>
                <button class="close" title="Close"><span>Close</span></button>
            </fieldset>
            <img alt="" class="content">
            <p class="summary">Asset summary</p>
        </div>
    </div>
    <header>
        <h1>Screenplay report</h1>
        <p>
            Generated on
            <span id="reportGeneratedOn">Report generated timestamp</span>,
            using <a href="https://csf-dev.github.io/CSF.Screenplay/">CSF.Screenplay</a>
        </p>
    </header>
    <nav>
        <h2>View mode</h2>
        <ul class="viewModeSelector">
            <li id="viewMode_features" class="active" title="Default view which lists the Features and the Scenarios they contain. Each Scenario includes a breakdown of its associated Performance.">Features & scenarios</li><li id="viewMode_errors" title="Lists unique errors across the whole Screenplay; useful to diagnose cross-Scenario errors">Errors</li><li id="viewMode_assets" title="Lists assets in the Screenplay, for quick access">Assets</li><li id="viewMode_performables" title="Lists the distinct Performables used across the Screenplay, for inspection">Performables</li>
        </ul>
    </nav>
    <main>
        <section id="featuresSection" class="hidden">
            <h2>Features &amp; scenarios</h2>
            <aside class="filter">
                <label for="scenarioFilter">Show</label>
                <select id="scenarioFilter">
                    <option value="all">All scenarios (XXX)</option>
                    <option value="failed">Failed scenarios (XXX)</option>
                    <option value="successful">Successful scenarios (XXX)</option>
                </select>
            </aside>
            <ul id="featureList"></ul>
        </section>
        <section id="errorsSection" class="hidden">
            TODO
        </section>
        <section id="assetsSection" class="hidden">
            TODO
        </section>
        <section id="performablesSection" class="hidden">
            TODO
        </section>
    </main>
    <script type="application/json" id="reportSrc"><!-- REPORT_PLACEHOLDER --></script>
    <template id="featureTemplate">
        <li class="collapsed">
            <span class="featureIdentifier" title="Feature identifier">Feature Identifier</span>
            <h3 class="featureName" title="Feature name; click to expand/collapse">Feature name</h3>
            <ul class="scenarioList collapsible"></ul>
        </li>
    </template>
    <template id="scenarioTemplate">
        <li class="collapsed">
            <span class="scenarioIdentifier" title="Scenario identifier">Scenario Identifier</span>
            <h4 class="scenarioName" title="Scenario name; click to expand/collapse">Scenario name</h4>
            <ol class="reportableList collapsible"></ol>
        </li>
    </template>
    <template id="reportableTemplate">
        <li class="collapsed">
            <div class="report">Report text</div>
            <div class="result">Result</div>
            <code class="exception">Exception</code>
            <aside>
                <div class="reportableInfo">
                    <div>
                        <table>
                            <colgroup>
                                <col class="property">
                                <col class="value">
                            </colgroup>
                            <tbody>
                                <tr>
                                    <th>Kind</th>
                                    <td class="kind">ActorCreatedReport</td>
                                </tr>
                                <tr>
                                    <th>Phase</th>
                                    <td class="phase">Given</td>
                                </tr>
                                <tr>
                                    <th>.NET type</th>
                                    <td class="dotnetType">Not applicable</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="assets" title="Assets produced from this performable"><ul></ul></div>
            </aside>
            <ol class="reportableList collapsible"></ol>
        </li>
    </template>
    <template id="assetTemplate">
        <li><a href="Asset path" class="image" title="Download/view this asset">Asset summary</a></li>
    </template>
</body>
</html>
